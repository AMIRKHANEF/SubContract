<svg viewBox="0 0 275 285" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">SubContract logo v3</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Bold geometric logo for SubContract — Solidity dev utilities for Polkadot. Features deconstructed Polkadot dot-cluster as sharp angular icon mark with a technical wordmark.</desc>
  <defs>
    
  <mask id="imagine-text-gaps-wmg39m" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="360" fill="white"/><rect x="250" y="42" width="138.2239990234375" height="119.20000457763672" fill="black" rx="2"/><rect x="250" y="142" width="312.88751220703125" height="90.4000015258789" fill="black" rx="2"/><rect x="250" y="240" width="373.3999938964844" height="19.199999809265137" fill="black" rx="2"/><rect x="596" y="240" width="44" height="19.199999809265137" fill="black" rx="2"/></mask></defs>

  <!-- ═══════════════════════════════════════════
