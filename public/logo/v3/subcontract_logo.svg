<svg width="100%" viewBox="0 0 250 300" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">SubContract logo v2</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Sharp technical logo for SubContract, a Solidity dev utilities Chrome extension for Polkadot</desc>

  <defs>
    
  <mask id="imagine-text-gaps-9lmqy7" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="340" fill="white"/><rect x="94.0062484741211" y="99.4000015258789" width="51.98749923706055" height="97.5999984741211" fill="black" rx="2"/><rect x="200" y="64.80000305175781" width="160.65000915527344" height="100" fill="black" rx="2"/><rect x="200" y="154.8000030517578" width="347.75" height="62.400001525878906" fill="black" rx="2"/><rect x="200" y="224.8000030517578" width="304.3125" height="18.40000057220459" fill="black" rx="2"/><rect x="593.6000366210938" y="224.8000030517578" width="38.39999961853027" height="18.40000057220459" fill="black" rx="2"/></mask></defs>

  <!-- ── Icon mark: sharp angled bracket stack ── -->
  <!-- Outer square, clipped corners (octagon feel) -->
  <polygon points="60,88 76,72 164,72 180,88 180,192 164,208 76,208 60,192" stroke-width="2" fill-opacity="1" style="fill:rgb(14, 17, 23);stroke:rgb(0, 255, 178);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Diagonal slash — the "sub" in subcontract, like a terminal command -->
  <polygon points="88,188 108,188 152,92 132,92" opacity="0.15" style="fill:rgb(0, 255, 178);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="108" y1="188" x2="152" y2="92" stroke-width="0" fill="none" mask="url(#imagine-text-gaps-9lmqy7)" style="fill:rgb(0, 255, 178);stroke:none;color:rgb(255, 255, 255);stroke-width:0px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Three horizontal lines (like code lines / contract clauses) -->
  <rect x="82" y="108" width="56" height="3" rx="1" opacity="0.3" style="fill:rgb(0, 255, 178);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="82" y="120" width="44" height="3" rx="1" opacity="0.3" style="fill:rgb(0, 255, 178);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="82" y="132" width="50" height="3" rx="1" opacity="0.3" style="fill:rgb(0, 255, 178);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Bold forward slash = the hero mark -->
  <text x="120" y="175" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="80" font-weight="800" opacity="0.95" style="fill:rgb(0, 255, 178);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:80px;font-weight:800;text-anchor:middle;dominant-baseline:auto">/</text>

  <!-- Orange dot — Polkadot nod -->
  <circle cx="163" cy="92" r="7" style="fill:rgb(255, 107, 53);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
